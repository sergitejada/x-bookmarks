<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 280px;
      margin: 0;
      padding: 16px;
      background: #0f1419;
      color: #e7e9ea;
    }
    h1 { font-size: 14px; margin: 0 0 4px; }
    .count { font-size: 28px; font-weight: 700; color: #1d9bf0; }
    .hint { font-size: 11px; color: #71767b; margin: 8px 0 12px; line-height: 1.4; }
    button {
      display: block;
      width: 100%;
      margin-bottom: 8px;
      padding: 8px 12px;
      border: none;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #1d9bf0;
      color: #fff;
    }
    button.secondary { background: #273340; color: #e7e9ea; }
    button.danger { background: transparent; color: #f4212e; }
    #status { font-size: 11px; color: #71767b; min-height: 14px; }
  </style>
</head>
<body>
  <h1>X Bookmarks Exporter</h1>
  <div class="count" id="count">0</div>
  <div class="hint">
    Abre <strong>x.com/i/bookmarks</strong> y haz scroll hasta el final.
    Los tweets se capturan automáticamente.
  </div>
  <button id="send">Enviar al servidor</button>
  <button id="export" class="secondary">Descargar JSON</button>
  <button id="clear" class="danger">Vaciar capturados</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
